<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | Complaints</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="javascript/supabase.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f1f5f9;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }
    .table-row:hover {
      background-color: #f8fafc;
      transition: all 0.2s;
    }
    :root {
            --sidebar-bg: #e0f2ff;
            --sidebar-border: #d1dce5;
            --sidebar-hover: #d1e9ff;
            --main-bg: #f8fafc;
            --card-bg: #ffffff;
            --accent-blue: #2563eb;
            --corporate-blue: #1e40af;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --accent-red: #dc2626;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-primary);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .sidebar-link-active {
            background-color: var(--corporate-blue) !important;
            color: white !important;
        }
        .sidebar-link-inactive {
            color: var(--deep-corporate-blue);
        }
        .sidebar-link-inactive span {
            color: var(--deep-corporate-blue);
        }
        .card-shadow {
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }
        @media print {

  /* Hide everything */
  body * {
    visibility: hidden;
  }

  /* Show only print section */
  #printSection, #printSection * {
    visibility: visible;
  }

  /* Keep table layout intact */
  #printSection {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    border: 1px solid #000;
    padding: 8px;
    text-align: left;
  }
}
  </style>
</head>

<body class="min-h-screen pb-12">

  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pt-8">
    
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">My Complaints</h1>
        <p class="text-sm text-slate-500">Track and manage your submitted lab issues.</p>
      </div>

      <div class="flex items-center gap-2">
        <button onclick="printTable()" class="text-[var(--accent-blue)] text-sm font-semibold hover:underline px-3 py-1 bg-blue-50 rounded-md">
          <span class="mr-2">🖨️</span> Print
        </button>
        <button onclick="downloadCSV()" class="text-[var(--accent-blue)] text-sm font-semibold hover:underline px-3 py-1 bg-blue-50 rounded-md">
          <span class="mr-2">📄</span> CSV
        </button>
        <button onclick="downloadPDF()" class="text-[var(--accent-blue)] text-sm font-semibold hover:underline px-3 py-1 bg-blue-50 rounded-md">
          <span class="mr-2">📥</span> PDF
        </button>
      </div>
    </div>

    <div class="glass-card p-4 rounded-xl mb-6 flex flex-col md:flex-row gap-4 shadow-sm">
      <div class="flex-grow relative">
        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
          🔍
        </span>
        <input id="searchInput" oninput="applyFilters()" type="text" placeholder="Search by title..."
          class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
      </div>
      
      <div class="w-full md:w-48">
        <select id="statusFilter" onchange="applyFilters()" class="w-full bg-slate-50 border border-slate-200 p-2 rounded-lg text-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none appearance-none cursor-pointer">
          <option value="">All Statuses</option>
          <option value="PENDING">Pending</option>
          <option value="IN_PROGRESS">In Progress</option>
          <option value="RESOLVED">Resolved</option>
        </select>
      </div>
    </div>

    <div id="printSection">
    <div class="glass-card rounded-xl shadow-lg overflow-hidden border border-slate-200">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
              <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Complaint Details</th>
              <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Lab Location</th>
              <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
              <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Priority</th>
              <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Date Filed</th>
            </tr>
          </thead>
          <tbody id="complaintsTable" class="divide-y divide-slate-100">
            </tbody>
        </table>
      </div>
      
      <div id="emptyState" class="hidden py-20 text-center">
        <div class="text-slate-300 text-6xl mb-4">📂</div>
        <h3 class="text-lg font-medium text-slate-900">No complaints found</h3>
        <p class="text-slate-500">Try adjusting your filters or search terms.</p>
      </div>
    </div>
    </div>
  </div>

<script>
let allComplaints = [];

window.onload = loadAllComplaints;

async function loadAllComplaints() {
  try {
    const { data } = await supabaseClient.auth.getSession();
    const token = data.session?.access_token;

    const res = await fetch("https://pbcnboxtlrymczzpppyl.supabase.co/functions/v1/get-complaints", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ role: "STUDENT" })
    });

    const result = await res.json();

    if (!result.success) {
      console.error(result.error);
      return;
    }

    allComplaints = result.data;
    renderTable(allComplaints);

  } catch (err) {
    console.error(err);
  }
}

function renderTable(complaints) {
  const table = document.getElementById("complaintsTable");
  const emptyState = document.getElementById("emptyState");
  table.innerHTML = "";

  if (!complaints || complaints.length === 0) {
    emptyState.classList.remove('hidden');
    return;
  } else {
    emptyState.classList.add('hidden');
  }

  complaints.forEach(c => {
    const row = `
      <tr class="table-row group">
        <td class="px-6 py-4">
          <div class="font-semibold text-slate-800">${c.title}</div>
          <div class="text-xs text-slate-400">ID: #${c.id}</div>
        </td>
        <td class="px-6 py-4 text-slate-600 font-medium">
          ${c.labs?.lab_name || "N/A"}
        </td>
        <td class="px-6 py-4">
          ${getStatusBadge(c.status)}
        </td>
        <td class="px-6 py-4">
          ${getPriorityBadge(c.priority)}
        </td>
        <td class="px-6 py-4 text-slate-500 text-sm">
          ${new Date(c.created_at).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })}
        </td>
      </tr>
    `;
    table.innerHTML += row;
  });
}

function getStatusBadge(status) {
  if (status === "PENDING") {
    return `<span class="px-3 py-1 text-[10px] font-bold rounded-full bg-yellow-100 text-yellow-600 px-2 py-1 rounded">Pending</span>`;
  }
  if (status === "IN_PROGRESS") {
    return `<span class="px-3 py-1 text-[10px] font-bold rounded-full bg-blue-100 text-blue-600 px-2 py-1 rounded">In Progress</span>`;
  }
  if (status === "RESOLVED") {
    return `<span class="px-3 py-1 text-[10px] font-bold rounded-full bg-green-100 text-green-600 px-2 py-1 rounded">Resolved</span>`;
  }
  if (status === "OPEN") {
    return `<span class="px-3 py-1 text-[10px] font-bold rounded-full bg-red-100 text-red-600 px-2 py-1 rounded">Open</span>`;
  }
  if (status === "ASSIGNED") {
    return `<span class="px-3 py-1 text-[10px] font-bold rounded-full bg-blue-100 text-blue-600 px-2 py-1 rounded">Assigned</span>`;
  }
  if (status === "CANCELLED") {
    return `<span class="px-3 py-1 text-[10px] font-bold rounded-full bg-red-100 text-red-600 px-2 py-1 rounded">Cancelled</span>`;
  }
  if (status === "ON_HOLD") {
    return `<span class="px-3 py-1 text-[10px] font-bold rounded-full bg-yellow-100 text-yellow-600 px-2 py-1 rounded">On Hold</span>`;
  }
  return status;
}

function getPriorityBadge(priority) {
  if (priority === "MEDIUM") {
    return `<span class="px-3 py-1 text-[10px] font-bold rounded-full bg-blue-100 text-blue-600 px-2 py-1 rounded">MEDIUM</span>`;
  }
  if (priority === "LOW") {
    return `<span class="px-3 py-1 text-[10px] font-bold rounded-full bg-green-100 text-green-600 px-2 py-1 rounded">LOW</span>`;
  }
  if (priority === "HIGH") {
    return `<span class="px-3 py-1 text-[10px] font-bold rounded-full bg-red-100 text-red-600 px-2 py-1 rounded">HIGH</span>`;
  }
  return status;
}

function applyFilters() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;

  let filtered = allComplaints.filter(c => {
    const matchesSearch = c.title.toLowerCase().includes(search);
    const matchesStatus = status === "" || c.status === status;
    return matchesSearch && matchesStatus;
  });

  renderTable(filtered);
}

function printTable() { window.print(); }

function downloadCSV() {
  const rows = document.querySelectorAll("table tr");
  let csv = [];
  rows.forEach(row => {
    const cols = row.querySelectorAll("td, th");
    let data = [];
    cols.forEach(col => data.push(`"${col.innerText.replace(/\n/g, ' ')}"`));
    csv.push(data.join(","));
  });
  const blob = new Blob([csv.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "my_complaints.csv";
  a.click();
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(18);
  doc.text("Student Complaint Report", 14, 20);
  doc.setFontSize(10);
  doc.setTextColor(100);
  doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 28);

  const headers = [["Title", "Lab", "Status", "Priority", "Date"]];
  const data = allComplaints.map(c => [
    c.title,
    c.labs?.lab_name || "-",
    c.status,
    c.priority,
    new Date(c.created_at).toLocaleDateString()
  ]);

  doc.autoTable({
    head: headers,
    body: data,
    startY: 35,
    theme: 'grid',
    headStyles: { fillColor: [79, 70, 229] }
  });

  doc.save("complaints_report.pdf");
}
</script>
</body>
</html>
