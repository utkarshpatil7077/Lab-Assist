<html lang="en">
<head>

  <script src="javascript/supabase.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;

            --main-bg: #f8fafc;
            --card-bg: #ffffff;
            --accent-blue: #2563eb;
            --corporate-blue: #1e40af;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --accent-red: #dc2626;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--main-bg);

        }

    visibility: hidden;

  /* Show only print section */
  #printSection, #printSection * {
    visibility: visible;
  }

  /* Keep table layout intact */

    position: absolute;
    top: 0;
    left: 0;
    width: 100%;

    width: 100%;
    border-collapse: collapse;
  }

<body class="p-6">

<div class="max-w-7xl mx-auto">

  <!-- Header -->
<div class="flex justify-between items-center mb-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">All Users</h1>
    <p class="text-sm text-slate-500">Students & Technicians</p>
  </div>

  <div class="flex items-center gap-2">
    <button onclick="printTable()" class="text-blue-600 text-sm font-semibold px-3 py-1 bg-blue-50 rounded-md">
      🖨️ Print
    </button>
    <button onclick="downloadCSV()" class="text-blue-600 text-sm font-semibold px-3 py-1 bg-blue-50 rounded-md">
      📄 CSV
    </button>
    <button onclick="downloadPDF()" class="text-blue-600 text-sm font-semibold px-3 py-1 bg-blue-50 rounded-md">
      📥 PDF
    </button>
  </div>
</div>

  <!-- Search -->
  <div class="glass-card p-4 rounded-xl mb-6 shadow-sm">
    <input id="searchInput" oninput="applyFilter()" type="text"
      placeholder="Search users..."
      class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
  </div>

  <!-- Table -->
   <div id="printSection">
  <div class="glass-card rounded-xl overflow-hidden shadow">
    <table class="w-full text-left">
      <thead class="bg-gray-100">
        <tr>
          <th class="p-3">Name</th>
          <th class="p-3">Role</th>
          <th class="p-3">Department</th>
          <th class="p-3">Extra Info</th>
        </tr>
      </thead>
      <tbody id="usersTable"></tbody>
    </table>

    <div id="emptyState" class="hidden text-center py-10 text-gray-400">
      No users found
    </div>
  </div>
  </div>

</div>

<script>

let allUsers = [];

window.onload = loadUsers;

// 🔹 Load Users
async function loadUsers() {
  try {
    const { data } = await supabaseClient.auth.getSession();
    const token = data.session?.access_token;

    if (!token) {
      alert("Please login first");
      return;
    }

    const res = await fetch("https://pbcnboxtlrymczzpppyl.supabase.co/functions/v1/get-students-technicians", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({organization_id : sessionStorage.getItem("organizationID")})
    });

    const text = await res.text();
console.log("RAW RESPONSE:", text);

let result;
try {
  result = JSON.parse(text);
} catch (e) {
  console.error("Invalid JSON:", text);
  return;
}

    if (!result.success) {
      console.error(result.error);
      return;
    }

    // 🔥 Merge data
    const students = result.students.map(s => ({
      name: s.name || "-",
      role: "STUDENT",
      department: s.department_id || "-",
      extra: "Roll: " + (s.roll_number || "-")
    }));

    const techs = result.technicians.map(t => ({
      name: t.name || "-",
      role: "TECHNICIAN",
      department: t.department_id || "-",
      extra: "Code: " + (t.employee_code || "-")
    }));

    allUsers = [...students, ...techs];

    renderUsers(allUsers);

  } catch (err) {
    console.error("Error:", err);
  }
}

// 🔹 Render Table
function renderUsers(users) {
  const table = document.getElementById("usersTable");
  const empty = document.getElementById("emptyState");

  table.innerHTML = "";

  if (!users || users.length === 0) {
    empty.classList.remove("hidden");
    return;
  } else {
    empty.classList.add("hidden");
  }

  users.forEach(u => {
    const row = `
      <tr class="table-row border-b">
        <td class="p-3">${u.name}</td>
        <td class="p-3">${getRoleBadge(u.role)}</td>
        <td class="p-3">${u.department}</td>
        <td class="p-3">${u.extra}</td>
      </tr>
    `;
    table.innerHTML += row;
  });
}

// 🔹 Role Badge
function getRoleBadge(role) {
  if (role === "STUDENT") {
    return `<span class="px-2 py-1 text-xs bg-blue-100 text-blue-600 rounded">Student</span>`;
  }
  if (role === "TECHNICIAN") {
    return `<span class="px-2 py-1 text-xs bg-purple-100 text-purple-600 rounded">Technician</span>`;
  }
  return role;
}

// 🔹 Search Filter
function applyFilter() {
  const search = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allUsers.filter(u =>
    u.name.toLowerCase().includes(search)
  );

  renderUsers(filtered);
}

function printTable() {
  window.print();
}

function downloadCSV() {
  const rows = document.querySelectorAll("table tr");
  let csv = [];

  rows.forEach(row => {
    const cols = row.querySelectorAll("td, th");
    let data = [];
    cols.forEach(col => data.push(`"${col.innerText}"`));
    csv.push(data.join(","));
  });

  const blob = new Blob([csv.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "labs.csv"; // 🔥 changed name
  a.click();
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Labs Report", 14, 15);

  const headers = [["Lab Name","Code","Type","Devices","Status"]];

    l.lab_code || "-",
    l.lab_type || "-",
    l.devices ? l.devices.length : 0,
    l.is_under_maintenance 
      ? "Maintenance" 
      : (l.is_active ? "Active" : "Inactive")
  ]);

  doc.autoTable({
    head: headers,

  doc.save("labs.pdf");
}

</script>

</body>
</html>
