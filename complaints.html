<!DOCTYPE html>
<html>
<head>
  <title>All Complaints</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- 1️⃣ Supabase library (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2️⃣ Your Supabase client config -->
<script src="javascript/supabase.js"></script>
<style type="text/tailwindcss">
        :root {
            --sidebar-bg: #e0f2ff;
            --sidebar-border: #cbd5e1;--sidebar-hover: #d1e9ff;
            --main-bg: #f8fafc;
            --card-bg: #ffffff;
            --accent-blue: #2563eb;
            --corporate-blue: #1e40af;
            --deep-corporate-blue: #0f172a;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --accent-red: #dc2626;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-primary);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .sidebar-link-active {
            background-color: var(--corporate-blue) !important;
            color: white !important;
        }
        .sidebar-link-inactive {
            color: var(--deep-corporate-blue);
        }
        .sidebar-link-inactive span {
            color: var(--deep-corporate-blue);
        }
        .card-shadow {
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>

<body class="p-6 bg-slate-50">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold">All Complaints</h2>

    <div class="space-x-2">
  <button onclick="printTable()" class="text-[var(--accent-blue)] text-sm font-semibold hover:underline px-3 py-1 bg-blue-50 rounded-md">
    Print
  </button>

  <button onclick="downloadCSV()" class="text-[var(--accent-blue)] text-sm font-semibold hover:underline px-3 py-1 bg-blue-50 rounded-md">
    CSV
  </button>

  <button onclick="downloadPDF()" class="text-[var(--accent-blue)] text-sm font-semibold hover:underline px-3 py-1 bg-blue-50 rounded-md">
    PDF
  </button>
</div>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto bg-white rounded-xl shadow">
    <table class="w-full text-left border">
      <thead class="bg-slate-100 text-sm">
        <tr>
          <th class="p-3">Title</th>
          <th class="p-3">Student</th>
          <th class="p-3">Lab</th>
          <th class="p-3">Status</th>
          <th class="p-3">Priority</th>
          <th class="p-3">Date</th>
        </tr>
      </thead>
      <tbody id="complaintsTable"></tbody>
    </table>
  </div>
  <script>
    window.addEventListener("DOMContentLoaded", loadAllComplaints);
    async function loadAllComplaints() {
    try {
        const { data } = await supabaseClient.auth.getSession();
        const token = data.session?.access_token;

        const response = await fetch("https://pbcnboxtlrymczzpppyl.supabase.co/functions/v1/get-complaints", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ role: "ADMIN" }) // or TECHNICIAN
        });

        const result = await response.json();
        console.log(result);
        const complaints = result.data;

        const table = document.getElementById("complaintsTable");
        table.innerHTML = "";

        complaints.forEach(c => {
        const row = `
            <tr class="border-b">
            <td class="p-3">${c.title}</td>
            <td class="p-3">${c.students?.name || "-"}</td>
            <td class="p-3">${c.labs?.lab_name || "-"}</td>
            <td class="p-3">${c.status}</td>
            <td class="p-3">${c.priority}</td>
            <td class="p-3">${new Date(c.created_at).toLocaleDateString()}</td>
            </tr>
        `;
        table.innerHTML += row;
        });

    } catch (err) {
        console.error(err);
    }
    }
    function printTable() {
        window.print();
    }

    function downloadCSV() {
    const rows = document.querySelectorAll("table tr");
    let csv = [];

    rows.forEach(row => {
        const cols = row.querySelectorAll("td, th");
        const data = [];

        cols.forEach(col => {
        let text = col.innerText.replace(/,/g, ""); // remove commas
        data.push(`"${text}"`);
        });

        csv.push(data.join(","));
    });

    const blob = new Blob([csv.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "complaints.csv";
    a.click();
    }
    async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(16);
    doc.text("Complaints Report", 14, 15);

    const table = document.querySelector("table");

    const headers = [];
    const data = [];

    // Get headers
    table.querySelectorAll("thead th").forEach(th => {
        headers.push(th.innerText);
    });

    // Get rows
    table.querySelectorAll("tbody tr").forEach(tr => {
        const row = [];
        tr.querySelectorAll("td").forEach(td => {
        row.push(td.innerText);
        });
        data.push(row);
    });

    doc.autoTable({
        head: [headers],
        body: data,
        startY: 20,
        styles: { fontSize: 8 },
        headStyles: { fillColor: [59, 130, 246] } // blue header
    });

    doc.save("complaints.pdf");
    }

    window.onload = loadAllComplaints;
  </script>
</body>
</html>
