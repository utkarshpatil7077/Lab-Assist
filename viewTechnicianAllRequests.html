<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Service Requests</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="javascript/supabase.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background:#f1f5f9; }

    .glass-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(226,232,240,0.8);
    }

    .table-row:hover { background:#f8fafc; }

    @media print {
      body * { visibility:hidden; }
      #printSection, #printSection * { visibility:visible; }

      #printSection {
        position:absolute;
        top:0;
        left:0;
        width:100%;
      }

      table { width:100%; border-collapse:collapse; }
      th, td { border:1px solid #000; padding:8px; }
    }
  </style>
</head>

<body class="min-h-screen p-6">

<div class="max-w-7xl mx-auto">

  <!-- 🔹 Header -->
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold">All Service Requests</h1>
      <p class="text-sm text-slate-500">Technician Dashboard</p>
    </div>

    <div class="flex gap-2">
      <button onclick="printTable()" class="bg-blue-50 px-3 py-1 rounded">🖨️ Print</button>
      <button onclick="downloadCSV()" class="bg-blue-50 px-3 py-1 rounded">📄 CSV</button>
      <button onclick="downloadPDF()" class="bg-blue-50 px-3 py-1 rounded">📥 PDF</button>
    </div>
  </div>

  <!-- 🔹 Filters -->
  <div class="glass-card p-4 rounded-xl mb-6 flex flex-col md:flex-row gap-4">

    <input id="searchInput" oninput="applyFilters()" type="text"
      placeholder="Search request..."
      class="w-full p-2 border rounded-lg">

    <select id="statusFilter" onchange="applyFilters()" class="p-2 border rounded-lg">
      <option value="">All Status</option>
      <option value="OPEN">Open</option>
      <option value="IN_PROGRESS">In Progress</option>
      <option value="RESOLVED">Resolved</option>
      <option value="QUEUED">Queued</option>
    </select>

  </div>

  <!-- 🔹 Table -->
  <div id="printSection">
    <div class="glass-card rounded-xl overflow-hidden">

      <table class="w-full text-left">
        <thead class="bg-gray-100">
          <tr>
            <th class="p-3">Title</th>
            <th class="p-3">Student</th>
            <th class="p-3">Lab</th>
            <th class="p-3">Status</th>
            <th class="p-3">Priority</th>
            <th class="p-3">Date</th>
            <th class="p-3 text-center">Action</th>
          </tr>
        </thead>

        <tbody id="requestsTable"></tbody>
      </table>

      <div id="emptyState" class="hidden text-center py-10 text-gray-400">
        No requests found
      </div>

    </div>
  </div>

</div>

<script>

let allRequests = [];

window.onload = loadRequests;

// 🔹 LOAD REQUESTS
async function loadRequests() {
  try {
    const { data } = await supabaseClient.auth.getSession();
    const token = data.session?.access_token;

    const res = await fetch("https://pbcnboxtlrymczzpppyl.supabase.co/functions/v1/get-complaints", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ role: "TECHNICIAN" })
    });

    const result = await res.json();

    if (!result.success) {
      console.error(result.error);
      return;
    }

    // 🔥 Sort DESC (latest first)
    allRequests = result.data.sort((a,b) =>
      new Date(b.created_at) - new Date(a.created_at)
    );

    renderTable(allRequests);

  } catch (err) {
    console.error(err);
  }
}

// 🔹 RENDER TABLE
function renderTable(data) {
  const table = document.getElementById("requestsTable");
  const empty = document.getElementById("emptyState");

  table.innerHTML = "";

  if (!data.length) {
    empty.classList.remove("hidden");
    return;
  } else {
    empty.classList.add("hidden");
  }

  data.forEach(c => {
    table.innerHTML += `
      <tr class="table-row border-b">
        <td class="p-3">${c.title}</td>
        <td class="p-3">${c.students?.name || "-"}</td>
        <td class="p-3">${c.labs?.lab_name || "-"}</td>
        <td class="p-3">${getStatusBadge(c.status)}</td>
        <td class="p-3">${getPriorityBadge(c.priority)}</td>
        <td class="p-3">${new Date(c.created_at).toLocaleDateString()}</td>
        <td class="p-3 text-center">
          ${getActionButtons(c)}
        </td>
      </tr>
    `;
  });
}

// 🔹 ACTION BUTTONS
function getActionButtons(c) {
  if (c.status === "OPEN") {
    return `
      <button onclick="updateStatus('${c.id}','IN_PROGRESS')" 
        class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-xs">
        Start
      </button>`;
  }

  if (c.status === "IN_PROGRESS") {
    return `
      <button onclick="updateStatus('${c.id}','RESOLVED')" 
        class="bg-green-100 text-green-600 px-2 py-1 rounded text-xs">
        Resolve
      </button>`;
  }

  return `<span class="text-xs text-gray-400">No Action</span>`;
}

// 🔹 UPDATE STATUS (calls your edge function)
async function updateStatus(id, status) {
  const { data } = await supabaseClient.auth.getSession();
  const token = data.session.access_token;

  await fetch("https://pbcnboxtlrymczzpppyl.supabase.co/functions/v1/update-complaint-status", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      complaint_id: id,
      new_status: status
    })
  });

  loadRequests(); // refresh
}

// 🔹 STATUS BADGE
function getStatusBadge(status) {
  if (status === "OPEN") return `<span class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs">Open</span>`;
  if (status === "IN_PROGRESS") return `<span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-xs">In Progress</span>`;
  if (status === "RESOLVED") return `<span class="bg-green-100 text-green-600 px-2 py-1 rounded text-xs">Resolved</span>`;
  if (status === "QUEUED") return `<span class="bg-yellow-100 text-yellow-600 px-2 py-1 rounded text-xs">Queued</span>`;
  return status;
}

// 🔹 PRIORITY
function getPriorityBadge(priority) {
  if (priority === "HIGH") return `<span class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs">HIGH</span>`;
  if (priority === "MEDIUM") return `<span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-xs">MEDIUM</span>`;
  if (priority === "LOW") return `<span class="bg-green-100 text-green-600 px-2 py-1 rounded text-xs">LOW</span>`;
  return priority;
}

// 🔹 FILTERS
function applyFilters() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;

  const filtered = allRequests.filter(c =>
    c.title.toLowerCase().includes(search) &&
    (status === "" || c.status === status)
  );

  renderTable(filtered);
}

// 🔹 PRINT
function printTable() { window.print(); }

// 🔹 CSV
function downloadCSV() {
  let csv = [["Title","Student","Lab","Status","Priority","Date"]];

  allRequests.forEach(c => {
    csv.push([
      c.title,
      c.students?.name || "-",
      c.labs?.lab_name || "-",
      c.status,
      c.priority,
      new Date(c.created_at).toLocaleDateString()
    ]);
  });

  const blob = new Blob([csv.map(e => e.join(",")).join("\n")]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "requests.csv";
  a.click();
}

// 🔹 PDF
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Service Requests Report", 14, 15);

  const rows = allRequests.map(c => [
    c.title,
    c.students?.name || "-",
    c.labs?.lab_name || "-",
    c.status,
    c.priority,
    new Date(c.created_at).toLocaleDateString()
  ]);

  doc.autoTable({
    head: [["Title","Student","Lab","Status","Priority","Date"]],
    body: rows,
    startY: 20
  });

  doc.save("requests.pdf");
}

</script>

</body>
</html>
